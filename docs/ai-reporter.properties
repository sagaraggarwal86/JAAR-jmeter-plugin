# ─────────────────────────────────────────────────────────────────────────────
# AI Reporter Plugin — Configuration
# Place this file in: $JMETER_HOME/bin/
#
# To activate a provider, set its api.key. All other fields are optional.
# ─────────────────────────────────────────────────────────────────────────────

# ── Groq (Free) ───────────────────────────────────────────────────────────────
ai.reporter.groq.api.key=
ai.reporter.groq.model=llama-3.3-70b-versatile
ai.reporter.groq.base.url=https://api.groq.com/openai/v1
ai.reporter.groq.timeout.seconds=60
ai.reporter.groq.max.tokens=4096
ai.reporter.groq.temperature=0.3

