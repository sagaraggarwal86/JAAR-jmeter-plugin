name: Build and Test

on:
  push:
    branches: [ main, 'Release/**', 'Dev/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean verify
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: spark-jmeter-plugin
          path: |
            target/spark-jmeter-plugin-*.jar
            src/main/scripts/spark-cli-report.bat
            src/main/scripts/spark-cli-report.sh
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: coverage-report
          path: target/site/jacoco/