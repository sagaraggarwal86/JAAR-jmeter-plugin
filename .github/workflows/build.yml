name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - run: mvn clean package -DskipTests
      - run: mvn test
      - uses: actions/upload-artifact@v4
        with:
          name: Configurable_Aggregate_Report
          path: target/Configurable_Aggregate_Report-*.jar
